services:
  mysql:
    image: mysql:8.4
    container_name: tf-api-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: tf_api_dev
    ports:
      - "3306:3306"
    volumes:
      - tf-api-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  tf-api-mysql-data:
